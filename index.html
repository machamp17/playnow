<script>

    var isMobile = /iPhone|iPod|Android.*Mobile|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
                || (window.matchMedia && window.matchMedia('(max-width: 760px)').matches);
    location.replace(isMobile ? 'mobile/' : 'desktop.html');
  })();
</script>
